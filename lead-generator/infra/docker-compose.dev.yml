      - ../services/distributor:/app/services/distributor
      - ../shared:/app/shared
    environment:
      LOG_LEVEL: DEBUG
      ENVIRONMENT: development
    command: watchmedo auto-restart --directory=/app --pattern="*.py" --recursive -- python services/distributor/main.py
