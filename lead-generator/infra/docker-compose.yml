x-common-env: &common-env
  env_file: ../.env

x-worker-base: &worker-base
  restart: unless-stopped
  env_file: ../.env
  networks:
    - lead-net
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lead_generator}
      POSTGRES_USER: ${POSTGRES_USER:-lead_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lead_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - lead-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lead_user} -d ${POSTGRES_DB:-lead_generator}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - lead-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - lead-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Workers ────────────────────────────────────────────────────────────────
  scraper:
    <<: *worker-base
    build:
      context: ..
      dockerfile: services/scraper/Dockerfile
    container_name: lead-scraper

  validator:
    <<: *worker-base
    build:
      context: ..
      dockerfile: services/validator/Dockerfile
    container_name: lead-validator

  deduplicator:
    <<: *worker-base
    build:
      context: ..
      dockerfile: services/deduplicator/Dockerfile
    container_name: lead-deduplicator

  enricher:
    <<: *worker-base
    build:
      context: ..
      dockerfile: services/enricher/Dockerfile
    container_name: lead-enricher

  scorer:
    <<: *worker-base
    build:
      context: ..
      dockerfile: services/scorer/Dockerfile
    container_name: lead-scorer

  orchestrator:
    <<: *worker-base
    build:
      context: ..
      dockerfile: services/orchestrator/Dockerfile
    container_name: lead-orchestrator

  distributor:
    <<: *worker-base
    build:
      context: ..
      dockerfile: services/distributor/Dockerfile
    container_name: lead-distributor

  outreach:
    <<: *worker-base
    build:
      context: ..
      dockerfile: services/outreach/Dockerfile
    container_name: lead-outreach

  api:
    <<: *worker-base
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: lead-api
    ports:
      - "8000:8000"

networks:
  lead-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
