x-worker-base: &worker-base
  restart: unless-stopped
  env_file: ../.env
  networks:
    - ma-net
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-motor_audiencia}
      POSTGRES_USER: ${POSTGRES_USER:-ma_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - ma-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ma_user} -d ${POSTGRES_DB:-motor_audiencia}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ma-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    networks:
      - ma-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # api:  # Uncomment after Task 8 (api/Dockerfile)
  #   <<: *worker-base
  #   build:
  #     context: ../api
  #     dockerfile: Dockerfile
  #   container_name: ma-api
  #   ports:
  #     - "5000:5000"

networks:
  ma-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
